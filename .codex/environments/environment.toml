# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "splitshot"

[setup]
script = '''
uv sync --extra dev

'''

[setup.darwin]
script = '''
uv sync --extra dev

'''

[cleanup]
script = '''
python - <<'PY'
from pathlib import Path
import shutil

root = Path.cwd()

for rel in [".venv", ".pytest_cache", ".ruff_cache", ".mypy_cache", "htmlcov", "build", "dist"]:
    shutil.rmtree(root / rel, ignore_errors=True)

for rel in [".coverage", "coverage.xml"]:
    p = root / rel
    if p.exists():
        p.unlink()

for p in root.rglob("__pycache__"):
    if p.is_dir():
        shutil.rmtree(p, ignore_errors=True)
PY
'''

[cleanup.darwin]
script = '''
python - <<'PY'
from pathlib import Path
import shutil

root = Path.cwd()

for rel in [".venv", ".pytest_cache", ".ruff_cache", ".mypy_cache", "htmlcov", "build", "dist"]:
    shutil.rmtree(root / rel, ignore_errors=True)

for rel in [".coverage", "coverage.xml"]:
    p = root / rel
    if p.exists():
        p.unlink()

for p in root.rglob("__pycache__"):
    if p.is_dir():
        shutil.rmtree(p, ignore_errors=True)
PY
'''

[[actions]]
