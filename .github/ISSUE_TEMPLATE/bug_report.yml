name: Bug report
description: Report a reproducible problem in SplitShot.
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest reliable steps.
      placeholder: |
        1. Launch SplitShot
        2. Open a project
        3. Do the action that triggers the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, app mode, Python version, and ffmpeg/ffprobe details.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I checked the docs and existing issues first.
          required: true