name: Feature request
description: Propose an improvement for SplitShot.
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What current limitation does the feature address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the desired behavior.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include workflows, screenshots, or examples if helpful.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I reviewed the docs and existing plans first.
          required: true